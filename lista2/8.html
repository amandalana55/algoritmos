<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inputA">Largura em metros:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <label for="inputB">Comprimento em metros:</label>
    <input type="number" id="inputB">
    <br>
    <br>
    <label for="inputC">Profundidade em metros:</label>
    <input type="number" id="inputC">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Total=</label>
    <span id="resp">0</span>
    <script>
     function funcaocalcular(){
     let l= parseFloat(document.getElementById("inputA").value);
     let c= parseFloat(document.getElementById("inputB").value);
     let p= parseFloat(document.getElementById("inputC").value);
     let m= l*c*p;
     let k= m*1000;
     document.getElementById("resp").innerHTML= k + "litros";
        }
    </script>
</body>
</html>
