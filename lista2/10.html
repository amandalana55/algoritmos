<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inputA">primeiro número:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <label for="inputB">segundo número:</label>
    <input type="number" id="inputB">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">soma=</label>
    <span id="resp">0</span>
    <br>
    <br>
    <label for="resp1">subtração=</label>
    <span id="resp1">0</span>
    <br>
    <br>
    <label for="resp2">multiplicação=</label>
    <span id="resp2">0</span>


    <script>
     function funcaocalcular(){
     let x= parseFloat(document.getElementById("inputA").value);
     let p= parseFloat(document.getElementById("inputB").value);
     let soma= x+p;
     let sub= x-p;
     let multi= x*p;
     document.getElementById("resp").innerHTML= soma;
     document.getElementById("resp1").innerHTML= sub;
     document.getElementById("resp2").innerHTML= multi;
        }
    </script>
</body>
</html>
