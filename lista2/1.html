<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inputA">X:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">f(x)=</label>
    <span id="resp">0</span>
    <script>
        function funcaocalcular(){
    let x=parseFloat(document.getElementById("inputA").value);
    let f= x**2;
    document.getElementById("resp").innerHTML= f;
        }
    </script>
</body>
</html>
