<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inputA">andar e número do apartamento:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Andar:</label>
    <span id="resp">0</span>
    <br>
    <br>
    <label for="resp1">apartamento:</label>
    <span id="resp1">0</span>
    <script>
     function funcaocalcular(){
     let x= parseFloat(document.getElementById("inputA").value);
     let t= Math.floor(x / 100);
     let m= x % 100;
     document.getElementById("resp").innerHTML= t ;
     document.getElementById("resp1").innerHTML= m;
        }
    </script>
</body>
</html>
