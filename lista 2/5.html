<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inputA">Valor em reais:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <label for="inputB"> %</label>
    <input type="number" id="inputB">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Total=</label>
    <span id="resp">0</span>
    <script>
     function funcaocalcular(){
     let x= parseFloat(document.getElementById("inputA").value);
     let p= parseFloat(document.getElementById("inputB").value);
     let t= p / 100;
     let m= t * x;
     let k= x - m;
     document.getElementById("resp").innerHTML= k;
        }
    </script>
</body>
</html>
