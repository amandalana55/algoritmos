<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
</head>
<body>
    <h1>Esse número é divisivel por 5 e 3 ao mesmo tempo?</h1>
    <label for="inputA">Digite um número aqui:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">resposta:</label> 
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let result="";
    if (a%5==0 && a%3==0){
        result= "É divisivel por 5 e 3";
    }else if(a%5==0){
        result= "É divisivel só por 5";
    }else if (a%3==0){
        result= "É divisivel só por 3";
    }else{
        result="Não é divisivel por nenhum dos dois";
    }
   document.getElementById("resp").innerHTML=result;
    }
    </script>
</body>
</html>
