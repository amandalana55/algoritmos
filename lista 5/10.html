<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
</head>
<body>
    <h1>Identificador de idade</h1>
    <label for="inputA">Quantos anos você tem?</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="ver" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">resposta:</label> 
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let result="";
    if (a<=12){
        result= "você é criança";
    }else if(a<=18){
        result= "você é adolescente";
    }else if(a<=60){
        result= "você é adulto";
    }else{
        result= "você é idoso";
    }
   document.getElementById("resp").innerHTML=result;
    }
    </script>
</body>
</html>
