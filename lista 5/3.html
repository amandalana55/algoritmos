<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
</head>
<body>
    <h1>divisão</h1>
    <label for="inputA">Dividendo:</label>
    <input type="number" id="inputA"> 
    <br>
    <br>
    <label for="inputB">Divisor:</label>
    <input type="number" id="inputB"> 
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Valor da divisão:</label> 
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let b= parseFloat(document.getElementById("inputB").value);
    let v= a/b;
    if (b===0){
        alert("Não podemos dividir por zero!");
    }
   document.getElementById("resp").innerHTML= v;
    }
    </script>
</body>
</html>
