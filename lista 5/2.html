<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskara</title>
    <link rel="stylesheet" href="bhaskara.css">
</head>
<body>
    <h2>Programa de calcular Bhaskara</h2>
<label for="inputA">Digite A</label>
<input type="number" name="inputA" id="inputA">
<br>
<label for="inputB">Digite B</label>
<input type="number" name="inputB" id="inputB">
<br>
<label for="inputC">Digite C</label>
<input type="number" name="inputC" id="inputC">
<br>
<br>
<input type="button" value="Calcular" onclick="funcaocalcular()">
<br>
<br>
<span id="resp1">x1:</span>
<br>
<span id="resp2">x2:</span>
<script>
    function funcaocalcular(){
    let valorA = parseFloat(document.getElementById("inputA").value);
    let valorB = parseFloat(document.getElementById("inputB").value);
    let valorC = parseFloat(document.getElementById("inputC").value);
    let delta = valorB**2 - 4*valorA*valorC;
    if(delta<=0){
        alert("Não possui raízes reais");
    }
    let raiz=Math.sqrt(delta);
    let soma1 = (-valorB - raiz)/ (2*valorA);
    let soma2 = (-valorB + raiz)/(2*valorA); 
    
    document.getElementById("resp1").innerHTML=soma1;
    document.getElementById("resp2").innerHTML=soma2;
    }
</script>
</body>
</html>
