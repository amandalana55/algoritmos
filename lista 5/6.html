<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
</head>
<body>
    <h1>par ou ímpar?</h1>
    <label for="inputA">Digite um valor qualquer:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">resposta:</label> 
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let result= "";
    if (a%2===0){
        result= "número par";
    }else{
        result= "número impar";
    }
   document.getElementById("resp").innerHTML=result;
    }
    </script>
</body>
</html>
