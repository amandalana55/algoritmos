<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
</head>
<body>
    <h1>verificação de triângulo</h1>
    <label for="inputA">Quantos lados iguais tem triângulo?</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">resposta:</label> 
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let result="";
    if (a===3){
        result= "Seu triangulo é equilátero";
    }else if(a===2){
        result= "Seu triangulo é isósceles";
    }else if(a===0){
        result= "seu triangulo é escaleno";
    }
   document.getElementById("resp").innerHTML=result;
    }
    </script>
</body>
</html>
