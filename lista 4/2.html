<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Gorjeta de restaurante</h1>
    <label for="inputA">valor total da conta:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Gorjeta:</label>
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let a = parseFloat(document.getElementById("inputA").value);
    let g= a * 0.1;
   document.getElementById("resp").innerHTML = g;
    }
    </script>
</body>
</html>
