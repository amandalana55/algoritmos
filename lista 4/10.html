<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>acululador</h2>
    <label for="inputA">Digite um número:</label>
    <input type="number" id="inputA"> 
    <br>
    <br>
    <input type="button" value="clique" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp"></label>
    <p id="resp">0</p>
    <script>
         let resposta= 0;
    function funcaocalcular(){
    let a= parseFloat(document.getElementById("inputA").value);
   resposta = resposta + a;
   document.getElementById("resp").innerHTML = resposta;
    }
    </script>
</body>
</html>
