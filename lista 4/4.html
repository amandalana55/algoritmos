<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Reais para euros</h1>
    <label for="inputA">Reais:</label>
    <input type="number" id="inputA">
    <br>
    <br>
    <input type="button" value="calcular" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Euros:</label>
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let r = parseFloat(document.getElementById("inputA").value);
    let e= r / 5.87;
   document.getElementById("resp").innerHTML = e.toFixed(2);
    }
    </script>
</body>
</html>
