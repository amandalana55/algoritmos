<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Gerar certficado</h1>
    <label for="inputA">Nome completo:</label>
    <input type="text" id="inputA">
    <br>
    <br>
    <label for="inputB">Nota final:</label>
    <input type="number" id="inputB">
    <br>
    <br>
    <input type="button" value="Gerar" onclick="funcaocalcular()">
    <br>
    <br>
    <label for="resp">Certificado:</label>
    <p id="resp"></p>
    <script>
    function funcaocalcular(){
    let n =document.getElementById("inputA").value;
    let nf= parseFloat(document.getElementById("inputB").value);
   document.getElementById("resp").innerHTML = "Certificamos que "+n+" concluiu com êxito o curso de Algoritmos. Sua dedicação e aprendizado foram avaliados com a nota final de "+nf+"."+" Parabéns pela conquista e sucesso em seus futuros desafios!";
    }
    </script>
</body>
</html>
