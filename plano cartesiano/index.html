<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico</title>
    <link rel="stylesheet" href="grafico.css">
</head>
<body>
   <main>
      <div class="item">
    <label for="inputX">Coordenada X</label>
    <input type="number" id="inputX">
      </div>
    <br>
    <br>
    <div class="item">
    <label for="inputY">Coordenada Y</label>
    <input type="number" id="inputY">
    </div>
    <br>
    <br>
    <div class="item">
    <input type="button" value="calcular" onclick="funcaocalcular()">
    </div>
    <br>
    <br>
    <div class="item">
    <label for="resp">Resposta=</label>
    <span id="resp">0</span>
    </div>
    <script>
    function funcaocalcular(){
     let X= parseFloat(document.getElementById("inputX").value);
     let Y=parseFloat(document.getElementById("inputY").value);
     let resultado= "";
     if (isNaN(X) || isNaN(Y)){
        resultado="Digite valores válidos";
     }else if(X===0 && Y===0){
        resultado="origem";
     }else if(X===0){
        resultado= "Eixo Y";
     }else if(Y==0){
        resultado= "Eixo X";
     }else if(X<0 && Y>0){
        resultado= "Quadrante 2";
     }else if (X<0 && Y<0){
        resultado= "Quadrante 3";
     } else if (X>0 && Y>0){
        resultado= "Quadrante 1";
     } else if (X>0 && Y<0){
       resultado= "Quadrante 4";
     }
    document.getElementById("resp").innerHTML= resultado;
    }
    </script>
</body>
</html>
